        // --- Core Multi-Provider AI Helpers ---
        const callAIAPI = async (userText, systemPrompt, aiConfig, useJson = false) => {
            const apiKey = aiConfig?.apiKey || "";
            if (!apiKey) return useJson ? null : "ระบบ AI ขัดข้อง: กรุณาตั้งค่า API Key ในหน้า Admin ก่อนใช้งานครับ";
            
            const provider = aiConfig?.provider || 'gemini';
            
            try {
                if (provider === 'gemini') {
                    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
                    const payload = { contents: [{ parts: [{ text: userText }] }], systemInstruction: { parts: [{ text: systemPrompt }] } };
                    if (useJson) payload.generationConfig = { responseMimeType: "application/json" };
                    const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                    const data = await res.json();
                    return data.candidates?.[0]?.content?.parts?.[0]?.text;
                } else if (provider === 'openai' || provider === 'openrouter') {
                    const url = provider === 'openai' ? 'https://api.openai.com/v1/chat/completions' : 'https://openrouter.ai/api/v1/chat/completions';

                        messages: [
                            { role: "system", content: systemPrompt + (useJson ? ' You MUST output valid JSON only.' : '') },
                            { role: "user", content: userText }
                        ]
                    };
                    if (useJson && provider === 'openai') payload.response_format = { type: "json_object" };
                    
                    const headers = { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` };
                    if (provider === 'openrouter') {
                        headers['HTTP-Referer'] = 'https://theplantfactory.demo';
                        headers['X-Title'] = 'The Plant Factory';
                    }
                    
                    const res = await fetch(url, { method: 'POST', headers, body: JSON.stringify(payload) });
                    const data = await res.json();
                    return data.choices?.[0]?.message?.content;
                }
            } catch (e) {
                console.error("AI API Error:", e);
                return null;
            }
        };

        const generateAIImage = async (prompt, aiConfig) => {
            const apiKey = aiConfig?.apiKey || "";
            if (!apiKey || aiConfig?.provider !== 'gemini') return "https://images.unsplash.com/photo-1546069901-ba9599a7e63c?auto=format&fit=crop&w=800&q=80"; 
            
            const url = `https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`;
            try {
                const response = await fetch(url, { method: 'POST', body: JSON.stringify({ instances: { prompt }, parameters: { sampleCount: 1 } }) });
                const data = await response.json();
                return `data:image/png;base64,${data.predictions[0].bytesBase64Encoded}`;
            } catch (e) { return "https://images.unsplash.com/photo-1546069901-ba9599a7e63c?auto=format&fit=crop&w=800&q=80"; }
        };

        // --- AIChatWidget Component ---
        const AIChatWidget = ({ products, cartItems, config }) => {
            const [isOpen, setIsOpen] = useState(false);
            const [messages, setMessages] = useState([{ role: 'model', text: config.greeting }]);
            const [input, setInput] = useState('');
            const [isLoading, setIsLoading] = useState(false);
            const messagesEndRef = useRef(null);

            useEffect(() => { messagesEndRef.current?.scrollIntoView({ behavior: "smooth" }); }, [messages]);

            const handleSend = async () => {
                if (!input.trim() || isLoading) return;
                const userMsg = input.trim();
                setInput('');
                setMessages(prev => [...prev, { role: 'user', text: userMsg }]);
                setIsLoading(true);

                const productNames = products.map(p => p.name).join(', ');
                const cartNames = cartItems.length > 0 ? cartItems.map(c => `${c.name} (${c.quantity})`).join(', ') : 'ไม่มีสินค้า';
                const systemPrompt = `${config.systemPrompt}\n\nข้อมูลอ้างอิง:\n- สินค้าทั้งหมดในฟาร์ม: ${productNames}\n- สินค้าในตะกร้าลูกค้า: ${cartNames}`;

                const aiResponse = await callAIAPI(userMsg, systemPrompt, config);
                setMessages(prev => [...prev, { role: 'model', text: aiResponse || "ขออภัยครับ ระบบสื่อสารขัดข้องชั่วคราว" }]);
                setIsLoading(false);
            };

            return (
                <div className="fixed bottom-6 right-6 z-50">

                            <div className="bg-gradient-to-r from-brand to-brand-dark p-4 flex justify-between items-center text-white">
                                <h3 className="font-bold flex items-center gap-2"><IconSparkles /> {config.title}</h3>
                                <button onClick={() => setIsOpen(false)} className="hover:text-gray-200 transition"><IconClose /></button>
                            </div>
                            <div className="flex-1 overflow-y-auto p-4 space-y-4 bg-gray-50">
                                {messages.map((msg, idx) => (
                                    <div key={idx} className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                        <div className={`max-w-[85%] p-3 rounded-2xl text-sm leading-relaxed ${msg.role === 'user' ? 'bg-brand text-white rounded-br-none' : 'bg-white border border-gray-200 text-gray-800 rounded-bl-none shadow-sm'}`}>
                                            {msg.text.split('\n').map((line, i) => <React.Fragment key={i}>{line}<br/></React.Fragment>)}
                                        </div>
                                    </div>
                                ))}
                                {isLoading && (
                                    <div className="flex justify-start">
                                        <div className="bg-white border border-gray-200 p-3 rounded-2xl rounded-bl-none shadow-sm flex items-center gap-1.5">
                                            <div className="w-2 h-2 bg-brand/50 rounded-full animate-bounce"></div>
                                            <div className="w-2 h-2 bg-brand/50 rounded-full animate-bounce" style={{animationDelay: '0.2s'}}></div>
                                            <div className="w-2 h-2 bg-brand/50 rounded-full animate-bounce" style={{animationDelay: '0.4s'}}></div>
                                        </div>
                                    </div>

                            </div>
                            <div className="p-3 bg-white border-t border-gray-100">
                                <div className="flex gap-2">
                                    <input value={input} onChange={e => setInput(e.target.value)} onKeyPress={e => e.key === 'Enter' && handleSend()} placeholder="พิมพ์ข้อความ..." className="flex-1 border border-gray-300 rounded-full px-4 py-2.5 text-sm outline-none focus:border-brand focus:ring-1 focus:ring-brand bg-gray-50" disabled={isLoading}/>
                                    <button onClick={handleSend} disabled={isLoading || !input.trim()} className="bg-brand text-white p-2.5 rounded-full hover:bg-brand-dark transition disabled:opacity-50 flex items-center justify-center">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="22" x2="11" y1="2" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                                    </button>
                                </div>
                            </div>

                    ) : (
                        <button onClick={() => setIsOpen(true)} className="bg-brand hover:bg-brand-dark text-white p-4 rounded-full shadow-[0_8px_30px_rgb(16,185,129,0.3)] transition-transform hover:scale-110 flex items-center justify-center gap-2 border-2 border-white">
                            <IconSparkles />
                            <span className="font-bold hidden sm:inline">ติดต่อเรา ✨</span>

        // --- Master Admin Panel Component ---

        // --- Main App Component ---
        const App = () => {
            const [user, setUser] = useState(null);
            const [siteData, setSiteData] = useState(defaultSiteData);
            const [subscribers, setSubscribers] = useState([]);
            const [currentView, setCurrentView] = useState('home'); 
            const [currentUser, setCurrentUser] = useState(null);
            
            const [cartItems, setCartItems] = useState([]);
            const [isCartOpen, setIsCartOpen] = useState(false);
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);

            const [subModalPlan, setSubModalPlan] = useState(null);
            const [isUpgradeModalOpen, setIsUpgradeModalOpen] = useState(false);
            const [tempSelections, setTempSelections] = useState([]);
            
            const [isCheckoutOpen, setIsCheckoutOpen] = useState(false);
            const [checkoutContext, setCheckoutContext] = useState({ type: null, data: null }); 
            const [checkoutStep, setCheckoutStep] = useState('confirm'); 
            const [paymentMethod, setPaymentMethod] = useState('qr');
            const [paymentStatus, setPaymentStatus] = useState('idle');

            const [editProfile, setEditProfile] = useState({ phone: '', address: '' });
            const [isRegisterMode, setIsRegisterMode] = useState(false);
            const [pendingPlan, setPendingPlan] = useState(null);

            const [personalAiMessage, setPersonalAiMessage] = useState('');
            const [isPersonalAiLoading, setIsPersonalAiLoading] = useState(false);
            const [recipeInput, setRecipeInput] = useState('');
            const [recipeOutput, setRecipeOutput] = useState(null);
            const [isRecipeLoading, setIsRecipeLoading] = useState(false);

            // ปิดหน้าต่างชำระเงินและเคลียร์ข้อมูลเพื่อป้องกันบัคค้าง
            const closeCheckout = () => {
                setIsCheckoutOpen(false);
                setCheckoutContext({ type: null, data: null });
                setPaymentStatus('idle');
            };

            // Firebase Initialization
            useEffect(() => {
                const { auth, db, appId, signInAnonymously, onAuthStateChanged, onSnapshot, doc, setDoc, collection, signInWithCustomToken } = window.fb;
                
                const initAuth = async () => {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }
                };
                initAuth();

                const unsubscribe = onAuthStateChanged(auth, (u) => {
                    setUser(u);
                    if (u) {
                        const siteDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'siteSettings', 'main');
                        onSnapshot(siteDocRef, (snap) => {
                            if (snap.exists()) {
                                const data = snap.data();
                                if(!data.aiWidget) data.aiWidget = defaultSiteData.aiWidget;
                                setSiteData(data);
                            }
                            else setDoc(siteDocRef, defaultSiteData);
                        });

                        const subCollRef = collection(db, 'artifacts', appId, 'public', 'data', 'subscribers');
                        onSnapshot(subCollRef, (snap) => {
                            const data = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                            setSubscribers(data);
                            if (currentUser) {
                                const updated = data.find(s => s.email === currentUser.email);
                                if (updated) {
                                    setCurrentUser(updated);
                                    setEditProfile({ phone: updated.phone || '', address: updated.address || '' });
                                }
                            }
                        });
                    }
                });
                return () => unsubscribe();
            }, [currentUser?.email]);

            // Personal Assistant Load
            useEffect(() => {
                if (currentView === 'member' && currentUser && siteData.aiWidget?.apiKey) {
                    const fetchPersonalAI = async () => {
                        setIsPersonalAiLoading(true);
                        const items = currentUser.selectedItems?.join(', ') || 'ยังไม่ได้เลือก';
                        const systemPrompt = `คุณคือผู้จัดการฟาร์ม (Farm Manager) ของ The Plant Factory กำลังส่งข้อความถึงลูกค้าชื่อ ${currentUser.name} อย่างสุภาพและเป็นกันเองเหมือนคนคุยกัน (ห้ามบอกว่าเป็น AI)
                        - ลูกค้ากำลังใช้แพ็กเกจ: ${currentUser.plan}
                        - ผักที่เลือก: ${items}
                        
                        คำสั่งพิเศษ:
                        - หากลูกค้าใช้แพ็กเกจ 'Kale Lover Plan' ให้พูดชักชวนให้ลองอัปเกรดเป็น 'Family Health Plan' หรือ 'Green Detox Plan' เพื่อความคุ้มค่าและเมนูที่หลากหลายขึ้น
                        - หากลูกค้าใช้แพ็กเกจ 'Family Health Plan' ให้เสนออัปเกรดเป็น 'Green Detox Plan' เพื่อรับน้ำสกัดเย็นไปดูแลสุขภาพขั้นสุด
                        - หากใช้ 'Green Detox Plan' หรือยังไม่มีแพ็กเกจ ให้ทักทายและขอบคุณตามปกติ
                        
                        เขียนสั้นๆ 3-4 ประโยค เป็นธรรมชาติ ไม่ต้องมีหัวข้อ`;

                        const response = await callAIAPI("เขียนข้อความทักทายลูกค้ารายนี้", systemPrompt, siteData.aiWidget);
                        setPersonalAiMessage(response || 'สวัสดีครับ ยินดีต้อนรับสู่ The Plant Factory ครับ');
                        setIsPersonalAiLoading(false);
                    };
                    fetchPersonalAI();
                } else if (currentView === 'member' && currentUser && !siteData.aiWidget?.apiKey) {
                     setPersonalAiMessage(`สวัสดีครับคุณ ${currentUser.name} วันนี้รับผักเคลหรือสลัดรวมดีครับ? (ระบบผู้ช่วยต้องการ API Key กรุณาตั้งค่าในหน้า Admin)`);
                }
            }, [currentView, currentUser?.id, siteData.aiWidget?.apiKey]);

            const generateRecipe = async () => {
                if (!recipeInput.trim() || !siteData.aiWidget?.apiKey) {
                    if(!siteData.aiWidget?.apiKey) alert("กรุณาตั้งค่า API Key ในหน้า Admin ก่อนใช้งานฟังก์ชันนี้ครับ");
                    return;
                }
                setIsRecipeLoading(true);
                const items = currentUser.selectedItems?.join(', ') || 'ผักสลัดออร์แกนิค';
                const systemPrompt = `คุณคือเชฟ AI ของ The Plant Factory คิดสูตรอาหารที่ใช้ผักของลูกค้า (${items}) ผสมกับวัตถุดิบ (${recipeInput}) ตอบกลับเป็นรูปแบบ JSON เท่านั้น โครงสร้าง: {"title": "ชื่อเมนู", "ingredients": ["วัตถุดิบ 1", "วัตถุดิบ 2"], "steps": ["วิธีทำ 1", "วิธีทำ 2"], "health_benefit": "ประโยชน์", "image_prompt": "English prompt for image generation of this food cinematic style"}`;
                
                try {
                    const responseText = await callAIAPI("คิดสูตรอาหาร", systemPrompt, siteData.aiWidget, true);
                    const recipeData = safeJsonParse(responseText);
                    if(recipeData) {
                        recipeData.imageUrl = await generateAIImage(recipeData.image_prompt, siteData.aiWidget);
                        setRecipeOutput(recipeData);
                    } else {
                        throw new Error("Invalid JSON formatting from AI");
                    }
                } catch (error) {
                    alert("ขออภัยครับ ระบบประมวลผลสูตรอาหารขัดข้องชั่วคราว ลองใช้ข้อความอื่น หรือเช็ค API Key ครับ");
                    console.error(error);
                }
                setIsRecipeLoading(false);
            };

            const processLoginSuccess = (userObj) => {
                setCurrentUser(userObj);
                setEditProfile({ phone: userObj.phone || '', address: userObj.address || '' });
                if (pendingPlan) {
                    setCurrentView('member');
                    setCheckoutContext({ type: 'upgrade', data: pendingPlan });
                    setCheckoutStep('confirm');
                    setIsCheckoutOpen(true);
                    setPendingPlan(null);
                } else if (checkoutContext && checkoutContext.type === 'cart' && cartItems.length > 0) {
                    setCurrentView('home'); 
                    setCheckoutStep('confirm');
                    setIsCheckoutOpen(true);
                } else {
                    setCurrentView('member');
                    setCheckoutContext({ type: null, data: null });
                }
                window.scrollTo(0,0);
            };

            const handleSubscribeClick = (plan) => {
                if (currentUser) {
                    setCheckoutContext({ type: 'upgrade', data: plan });
                    setCheckoutStep('confirm');
                    setIsCheckoutOpen(true);
                } else {
                    setPendingPlan(plan);
                    setCurrentView('login');
                    setIsRegisterMode(true);
                    window.scrollTo(0,0);
                }
            };

            const handleLogin = async (e) => {
                e.preventDefault();
                const email = e.target.email.value;
                let foundUser = subscribers.find(u => u.email === email);
                
                if (!foundUser && email === 'user@test.com') {
                    foundUser = {
                        id: 'usr-test-1',
                        name: 'คุณสมชาย ใจดี',
                        email: 'user@test.com',
                        phone: '020-555-1234',
                        address: '123 ถ.ล้านช้าง นครหลวงเวียงจันทน์',
                        location: '17.9757,102.6331',
                        plan: 'Family Health Plan',
                        status: 'Active',
                        joinDate: new Date().toISOString().split('T')[0],
                        nextDelivery: 'รอบจัดส่งถัดไป',
                        selectedItems: ['Premium Mixed Salad', 'Crispy Green Oak'],
                        paymentMethod: 'QR Code',
                        amount: 1590,
                        lastPaid: new Date().toISOString().split('T')[0]
                    };
                    await window.fb.setDoc(window.fb.doc(window.fb.db, 'artifacts', window.fb.appId, 'public', 'data', 'subscribers', foundUser.id), foundUser);
                }

                if (foundUser) {
                    processLoginSuccess(foundUser);
                } else {
                    alert('ไม่พบข้อมูลอีเมลนี้ในระบบ (กรุณาลงทะเบียนก่อนครับ)');
                }
            };

            const handleRegister = async (e) => {
                e.preventDefault();
                const name = e.target.name.value;
                const email = e.target.email.value;
                
                if (subscribers.find(s => s.email === email)) {
                    alert('อีเมลนี้ถูกใช้งานแล้ว กรุณาเข้าสู่ระบบ');
                    return;
                }

                const newUser = {
                    id: 'usr-' + Date.now(),
                    name: name,
                    email: email,
                    phone: '',
                    address: '',
                    location: '',
                    plan: 'ยังไม่ได้เลือกแพ็กเกจ',
                    status: 'Active',
                    joinDate: new Date().toISOString().split('T')[0],
                    nextDelivery: '-',
                    selectedItems: [],
                    paymentMethod: '-',
                    amount: 0,
                    lastPaid: '-'
                };

                await window.fb.setDoc(window.fb.doc(window.fb.db, 'artifacts', window.fb.appId, 'public', 'data', 'subscribers', newUser.id), newUser);
                processLoginSuccess(newUser);
            };

            const processGoogleUser = async (email, name, uid) => {
                let foundUser = subscribers.find(u => u.email === email);
                if (!foundUser) {
                    foundUser = {
                        id: uid,
                        name: name,
                        email: email,
                        phone: '',
                        address: '',
                        location: '',
                        plan: 'ยังไม่ได้เลือกแพ็กเกจ',
                        status: 'Active',
                        joinDate: new Date().toISOString().split('T')[0],
                        nextDelivery: '-',
                        selectedItems: [],
                        paymentMethod: '-',
                        amount: 0,
                        lastPaid: '-'
                    };
                    await window.fb.setDoc(window.fb.doc(window.fb.db, 'artifacts', window.fb.appId, 'public', 'data', 'subscribers', foundUser.id), foundUser);
                }
                processLoginSuccess(foundUser);
            };

            const handleGoogleLogin = async () => {
                try {
                    const provider = new window.fb.GoogleAuthProvider();
                    const result = await window.fb.signInWithPopup(window.fb.auth, provider);
                    const user = result.user;
                    const email = user.email;
                    const name = user.displayName || email.split('@')[0];
                    await processGoogleUser(email, name, user.uid);
                } catch (error) {
                    console.error("Google Login Error:", error);
                    if (error.code === 'auth/unauthorized-domain' || (error.message && error.message.includes('unauthorized-domain'))) {
                        alert("ระบบตรวจพบการทดสอบในสภาพแวดล้อมจำลอง\nกำลังสลับไปใช้ระบบจำลองล็อกอินด้วย Google...");
